<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Awita Mega</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:Arial;background:black;color:white;}
header{position:relative;height:100vh;overflow:hidden;}
video{position:absolute;width:100%;height:100%;object-fit:cover;opacity:.3;}
header .content{position:relative;text-align:center;top:35%;}
header img{width:130px;}
nav{position:fixed;top:0;width:100%;background:#000c;padding:10px;text-align:center;}
nav a{color:gold;margin:15px;text-decoration:none;font-weight:bold;}
.hero{padding:40px;text-align:center;opacity:0;transform:translateY(40px);transition:1s;}
.hero.show{opacity:1;transform:translateY(0);}
.slider{max-width:800px;margin:20px auto;}
.slider img{width:100%;display:none;border-radius:15px;}
.slider img.active{display:block;}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding:20px;}
.gallery img{width:100%;border-radius:12px;transition:.3s;}
.gallery img:hover{transform:scale(1.05);box-shadow:0 0 10px gold;}
.wa{position:fixed;bottom:20px;right:20px;background:#25D366;color:white;padding:15px 20px;border-radius:50px;text-decoration:none;}
</style>
</head>
<body>

<nav>
<a href="index.html">Home</a>
<a href="layanan.html">Layanan</a>
<a href="kontak.html">Kontak</a>
</nav>

<header>
<video autoplay muted loop>
<source src="video.mp4" type="video/mp4">
</video>
<div class="content">
<img src="logo.jpg">
<h1>AWITA MEGA</h1>
<p>Jasa AC • HVAC • Teknik Gedung</p>
</div>
</header>

<section class="hero" id="hero">
<h2>Solusi Profesional AC & Gedung</h2>
<p>Instalasi, perawatan & troubleshooting gedung.</p>
</section>

<div class="slider">
<img src="IMG-20260225-WA0001.jpg" class="active">
<img src="IMG-20260218-WA0004.jpg">
<img src="IMG-20260124-WA0003.jpg">
<img src="IMG-20260222-WA0008.jpg">
</div>

<section class="gallery">
<img src="IMG-20260225-WA0001.jpg">
<img src="IMG-20260218-WA0004.jpg">
<img src="IMG-20260124-WA0003.jpg">
<img src="IMG-20260222-WA0008.jpg">
</section>

<a class="wa" href="https://wa.me/6283181216047">💬 WhatsApp</a>

<script>
let i=0;
const slides=document.querySelectorAll(".slider img");
setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);

window.addEventListener("scroll",()=>{
document.getElementById("hero").classList.add("show");
});
</script>

</body>
</html>
